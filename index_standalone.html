// ── Fade-in Hook ─────────────────────────────────────────────
window.useFadeIn = function useFadeIn() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return { ref, visible };
};

window.FadeIn = function FadeIn({ children, delay = 0, style = {} }) {
  const { ref, visible } = useFadeIn();
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(24px)',
      transition: `opacity 0.7s ${delay}s cubic-bezier(0.16,1,0.3,1), transform 0.7s ${delay}s cubic-bezier(0.16,1,0.3,1)`,
      ...style,
    }}>{children}</div>
  );
};

<script type="text/babel">
// PPS 셀프사진관 — Price Calculator Component

function PriceCalculator() {
  const { useState } = React;
  const [count, setCount] = useState(2);
  const [withPhotographer, setWithPhotographer] = useState(false);

  // 정확한 요금 계산
  // 기본: 2인 60,000원
  // 3~5인: 1인 추가당 +15,000원
  // 6인~: 1인 추가당 +10,000원
  // 작가 촬영 옵션: +50,000원 (별도)
  const calcBase = (n) => {
    // 최소 2인부터 — 1인 ID는 별도 상품
    if (n === 2) return 60000;
    if (n <= 5) return 60000 + (n - 2) * 15000;
    return 60000 + 3 * 15000 + (n - 5) * 10000;
  };

  const PHOTOGRAPHER_FEE = 50000;

  const base = calcBase(count);
  const photographerFee = withPhotographer ? PHOTOGRAPHER_FEE : 0;
  const total = base + photographerFee;
  const perPerson = Math.round(total / count);

  const getPkgLabel = (n) => {
    // 1인 ID는 별도 상품이라 계산기에서는 다루지 않음 (최소 2인 시작)
    if (n <= 5) return { tag:'기본 촬영', color:'#FF3D8B', name:'기본 촬영 패키지', desc:'셀프 촬영 + 전문 보정' };

    if (n <= 5) return n + '인 기준 1인당 ' + Math.round(calcBase(n)/n).toLocaleString() + '원이에요. 친구끼리 오면 더 합리적!';

const DRUM = '  ABCDEFGHIJKLMNOPRSTUVWXYZ0123456789·:/-';

function FlipTile({ ch }) {
  const [top, setTop] = useState(ch);
  const [bottom, setBottom] = useState(ch);
  const [stage, setStage] = useState('idle');
  const [incoming, setIncoming] = useState(ch);
  const scheduled = useRef(null);
  const bottomRef = useRef(ch);

  useEffect(() => {
    if (ch === bottomRef.current) return;
    bottomRef.current = ch;
    clearTimeout(scheduled.current);
    setIncoming(ch);
    setStage('fold-out');
    scheduled.current = setTimeout(() => {
      setBottom(ch);
      setStage('fold-in');
      scheduled.current = setTimeout(() => {
        setTop(ch);
        setStage('idle');
      }, 200);
    }, 200);
    return () => clearTimeout(scheduled.current);
  }, [ch]);

  const isSpace = ch === ' ';
  const tileW = isSpace ? 6 : 14;
  const cardBg = '#141210';
  const cardBgActive = '#1e1b17';

  return (
    <span style={{ display: 'inline-flex', flexDirection: 'column', verticalAlign: 'middle', margin: '0 1px', perspective: '300px' }}>
      <span style={{ display: 'inline-flex', alignItems: 'flex-end', justifyContent: 'center', width: tileW, height: '0.58em', paddingBottom: 1, background: stage !== 'idle' ? cardBgActive : cardBg, borderRadius: '2px 2px 0 0', transformOrigin: '50% 100%', transform: stage === 'fold-out' ? 'rotateX(90deg)' : 'rotateX(0deg)', transition: stage === 'fold-out' ? 'transform 0.18s ease-in' : 'none', overflow: 'hidden' }}>

          {stage === 'fold-in' ? incoming : top}
        </span>
      </span>
      <span style={{ display: 'block', width: tileW, height: 1, background: 'rgba(0,0,0,0.8)', flexShrink: 0 }} />
      <span style={{ display: 'inline-flex', alignItems: 'flex-start', justifyContent: 'center', width: tileW, height: '0.58em', paddingTop: 1, background: cardBg, borderRadius: '0 0 2px 2px', boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.4)', overflow: 'hidden' }}>

          {bottom}
        </span>
      </span>
    </span>);

}
